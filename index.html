<script>
// ═══════════════════════════════════════════════════════════
//  WEEKEND STATE
//  periodOverrides: Map<periodText, { sat: bool, sun: bool }>
//  null = "use global setting"
// ═══════════════════════════════════════════════════════════
const weekendState = {
    globalSat: true,   // show Saturday globally?
    globalSun: true,   // show Sunday globally?
    periodOverrides: new Map()  // per-period overrides
};

function onWeekendChange() {
    weekendState.globalSat = document.getElementById('showSat').checked;
    weekendState.globalSun = document.getElementById('showSun').checked;
    generate();
}

// Returns { showSat, showSun } for a given period string
function getWeekendSetting(periodText) {
    if (weekendState.periodOverrides.has(periodText)) {
        return weekendState.periodOverrides.get(periodText);
    }
    return { showSat: weekendState.globalSat, showSun: weekendState.globalSun };
}

// Toggle a per-period override
function togglePeriodOverride(periodText, day) {
    const current = weekendState.periodOverrides.get(periodText) ||
        { showSat: weekendState.globalSat, showSun: weekendState.globalSun };
    const updated = { ...current };
    if (day === 'sat') updated.showSat = !updated.showSat;
    if (day === 'sun') updated.showSun = !updated.showSun;
    weekendState.periodOverrides.set(periodText, updated);
    renderPeriodPills();
    generate();
}

// Build per-period pill buttons in the weekend bar
function renderPeriodPills() {
    const periods = parsePeriods(document.getElementById('periods').value);
    const container = document.getElementById('wbPeriodList');
    if (periods.length === 0) { container.innerHTML = ''; return; }

    let html = '';
    for (const p of periods) {
        const ov  = weekendState.periodOverrides.get(p.period) ||
                    { showSat: weekendState.globalSat, showSun: weekendState.globalSun };
        const satCls = ov.showSat ? 'on-sat' : '';
        const sunCls = ov.showSun ? 'on-sun' : '';
        html += `<div class="wb-period-pill">
            <span class="pill-name">${escapeHtml(p.period)}</span>
            <button class="pill-btn ${satCls}" onclick="togglePeriodOverride('${p.period.replace(/'/g,"\\'")}','sat')"
                title="Toggle Saturday for this period">SAT</button>
            <button class="pill-btn ${sunCls}" onclick="togglePeriodOverride('${p.period.replace(/'/g,"\\'")}','sun')"
                title="Toggle Sunday for this period">SUN</button>
        </div>`;
    }
    container.innerHTML = html;
}

// ═══════════════════════════════════════════════════════════
//  WEEKEND DATE DETECTION
//  Given a period string like "April 24-30, 2026" or "May 1-15, 2026"
//  returns a Set of day-numbers (1-31) that are Sat (6) or Sun (0)
// ═══════════════════════════════════════════════════════════
function detectWeekendDays(periodText) {
    const result = { saturdays: new Set(), sundays: new Set() };
    if (!periodText) return result;

    // Try to parse: "Month D1-D2, YYYY" or "Month D1-D2 YYYY" or "Month YYYY"
    const MONTHS = {
        january:1,february:2,march:3,april:4,may:5,june:6,
        july:7,august:8,september:9,october:10,november:11,december:12
    };

    const text = periodText.trim().toLowerCase();

    // Match "april 24-30, 2026" or "may 1-31 2026"
    const rangeMatch = text.match(/([a-z]+)\s+(\d{1,2})[–\-](\d{1,2})[,\s]+(\d{4})/);
    if (rangeMatch) {
        const mon   = MONTHS[rangeMatch[1]];
        const start = parseInt(rangeMatch[2], 10);
        const end   = parseInt(rangeMatch[3], 10);
        const year  = parseInt(rangeMatch[4], 10);
        if (mon && !isNaN(start) && !isNaN(end) && !isNaN(year)) {
            for (let d = start; d <= end; d++) {
                const date = new Date(year, mon - 1, d);
                const dow  = date.getDay(); // 0=Sun, 6=Sat
                if (dow === 6) result.saturdays.add(d);
                if (dow === 0) result.sundays.add(d);
            }
            return result;
        }
    }

    // Match "april 2026" — full month
    const fullMatch = text.match(/([a-z]+)\s+(\d{4})/);
    if (fullMatch) {
        const mon  = MONTHS[fullMatch[1]];
        const year = parseInt(fullMatch[2], 10);
        if (mon && !isNaN(year)) {
            const daysInMonth = new Date(year, mon, 0).getDate();
            for (let d = 1; d <= daysInMonth; d++) {
                const date = new Date(year, mon - 1, d);
                const dow  = date.getDay();
                if (dow === 6) result.saturdays.add(d);
                if (dow === 0) result.sundays.add(d);
            }
            return result;
        }
    }

    return result; // could not detect — empty sets
}

document.getElementById('fileInput').addEventListener('change', handleFileUpload);

function handleFileUpload(e) {
    const file   = e.target.files[0];
    const status = document.getElementById('uploadStatus');
    if (!file) return;

    status.className = 'upload-status';
    status.textContent = 'Reading file...';

    const reader = new FileReader();
    reader.onload = function(event) {
        try {
            const data = new Uint8Array(event.target.result);
            const wb   = XLSX.read(data, { type: 'array' });
            const sheet = wb.Sheets[wb.SheetNames[0]];
            const rows  = XLSX.utils.sheet_to_json(sheet, { defval: '', raw: false });

            if (!rows.length) {
                status.className = 'upload-status error';
                status.textContent = '⚠ No data rows found in the file.';
                return;
            }

            const keys    = Object.keys(rows[0]);
            const findKey = patterns => {
                for (const k of keys) {
                    const low = k.toLowerCase().trim();
                    for (const p of patterns) { if (low.includes(p)) return k; }
                }
                return null;
            };

            const nameKey    = findKey(['name', 'pangalan']);
            const tupadIdKey = findKey(['tupad id', 'tupad_id', 'tupadid', 'tupad-id']);
            const idKey      = tupadIdKey ? null : findKey(['id', 'suffix', 'no.', 'number']);
            const addrKey    = findKey(['address', 'tirahan']);
            const prefixKey  = tupadIdKey ? null : findKey(['prefix']);
            const pesoKey    = findKey(['peso manager', 'manager', 'supervisor', 'signatory']);
            const desigKey   = findKey(['designation', 'role', 'title']);

            if (!nameKey) {
                status.className = 'upload-status error';
                status.textContent = '⚠ Could not find a "Name" column.';
                return;
            }

            const lines     = [];
            let firstPrefix = '';
            const periodSet = new Map();

            rows.forEach((r, i) => {
                const name = String(r[nameKey] || '').trim();
                if (!name) return;

                let id = '';
                if (tupadIdKey) {
                    id = String(r[tupadIdKey] || '').trim();
                } else {
                    id = idKey ? String(r[idKey] || '').trim() : '';
                    if (i === 0 && prefixKey) firstPrefix = String(r[prefixKey] || '').trim();
                }

                const addr  = addrKey  ? String(r[addrKey]  || '').trim() : '';
                const peso  = pesoKey  ? String(r[pesoKey]  || '').trim() : '';
                const desig = desigKey ? String(r[desigKey] || '').trim() : '';
                lines.push([name, id, addr, peso, desig].join(' | '));

                const monthKey = findKey(['month', 'period', 'buwan']);
                const daysKey  = findKey(['work day', 'workday', 'days']);
                if (monthKey || daysKey) {
                    const mv = monthKey ? String(r[monthKey] || '').trim() : '';
                    const dv = daysKey  ? String(r[daysKey]  || '').trim() : '';
                    if (mv || dv) {
                        const k = mv + '|' + dv;
                        if (!periodSet.has(k)) periodSet.set(k, { period: mv, days: dv });
                    }
                }
            });

            document.getElementById('beneficiaries').value = lines.join('\n');
            if (tupadIdKey) {
                document.getElementById('idPrefix').value = '';
            } else if (firstPrefix) {
                document.getElementById('idPrefix').value = firstPrefix;
            }

            if (rows.length > 0) {
                const fp = pesoKey  ? String(rows[0][pesoKey]  || '').trim() : '';
                const fd = desigKey ? String(rows[0][desigKey] || '').trim() : '';
                if (fp) document.getElementById('pesoManager').value     = fp;
                if (fd) document.getElementById('pesoDesignation').value = fd;
            }

            if (periodSet.size > 0) {
                document.getElementById('periods').value =
                    Array.from(periodSet.values()).map(p => `${p.period} | ${p.days}`).join('\n');
            }

            status.className = 'upload-status';
            status.textContent = `✓ Loaded ${lines.length} beneficiar${lines.length === 1 ? 'y' : 'ies'} from ${file.name}`;

            weekendState.periodOverrides.clear();
            renderPeriodPills();
            generate();
        } catch (err) {
            console.error(err);
            status.className = 'upload-status error';
            status.textContent = '⚠ Error reading file: ' + err.message;
        }
    };
    reader.onerror = () => {
        status.className = 'upload-status error';
        status.textContent = '⚠ Failed to read file.';
    };
    reader.readAsArrayBuffer(file);
}

// ═══════════════════════════════════════════════════════════
//  PARSE HELPERS
// ═══════════════════════════════════════════════════════════
function parseWorkDays(str) {
    const days = new Set();
    if (!str) return days;
    for (const part of str.split(',')) {
        const p = part.trim();
        if (p.includes('-')) {
            const [a, b] = p.split('-').map(n => parseInt(n.trim(), 10));
            if (!isNaN(a) && !isNaN(b)) for (let i = a; i <= b; i++) days.add(i);
        } else {
            const n = parseInt(p, 10);
            if (!isNaN(n)) days.add(n);
        }
    }
    return days;
}

function parsePeriods(text) {
    return text.split('\n').map(l => l.trim()).filter(Boolean).map(t => {
        const pi       = t.indexOf('|');
        const period   = (pi >= 0 ? t.slice(0, pi) : t).trim();
        const daysText = (pi >= 0 ? t.slice(pi + 1) : '').trim();
        return period ? { period, workDays: parseWorkDays(daysText) } : null;
    }).filter(Boolean);
}

function parseBeneficiaries(str) {
    return str.split('\n').map(l => l.trim()).filter(Boolean).map(t => {
        if (t.includes('|')) {
            const parts = t.split('|').map(s => s.trim());
            return { name: parts[0]||'', idSuffix: parts[1]||'', address: parts[2]||'', pesoManager: parts[3]||'', pesoDesignation: parts[4]||'' };
        }
        const parts = t.split(',').map(s => s.trim());
        return { name: parts[0]||'', idSuffix: parts[1]||'', address: parts.slice(2).join(', '), pesoManager: '', pesoDesignation: '' };
    }).filter(b => b.name);
}

function escapeHtml(s) {
    if (s == null) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ═══════════════════════════════════════════════════════════
//  BUILD DTR CARD
//  weekendInfo = { saturdays: Set, sundays: Set, showSat: bool, showSun: bool }
// ═══════════════════════════════════════════════════════════
function buildDTR(data, isSample, weekendInfo) {
    const { name, tupadId, address, period, pesoManager, pesoDesignation,
            verifier, verifierTitle, office, workDays } = data;
    const { saturdays, sundays, showSat, showSun } = weekendInfo;

    let tableRows = '';
    for (let d = 1; d <= 31; d++) {
        const isSat = saturdays.has(d);
        const isSun = sundays.has(d);

        // If this day is a hidden weekend, show label row
        if (isSat && !showSat) {
            tableRows += `<tr class="weekend-row saturday-row">
                <td>${d}</td>
                <td colspan="4" style="font-size:7pt;font-weight:bold;color:#000000;letter-spacing:1px;">SATURDAY</td>
            </tr>`;
            continue;
        }
        if (isSun && !showSun) {
            tableRows += `<tr class="weekend-row sunday-row">
                <td>${d}</td>
                <td colspan="4" style="font-size:7pt;font-weight:bold;color:#000000;letter-spacing:1px;">SUNDAY</td>
            </tr>`;
            continue;
        }

        // Normal row
        const filled = isSample && workDays.has(d);
        // If it's a shown weekend day (but not excluded), still tint
        const rowCls = isSat ? 'saturday-row' : (isSun ? 'sunday-row' : '');
        tableRows += `<tr class="${rowCls}">
            <td>${d}</td>
            <td class="time-cell">${filled ? '8:00'  : ''}</td>
            <td class="time-cell">${filled ? '12:00' : ''}</td>
            <td class="time-cell">${filled ? '1:00'  : ''}</td>
            <td class="time-cell">${filled ? '5:00'  : ''}</td>
        </tr>`;
    }

    return `<div class="dtr ${isSample ? 'sample' : ''}">
        <div class="dtr-top">
            <div class="annex">ANNEX J-1</div>
            <div class="title">DAILY TIME RECORD</div>
            <div class="field"><span class="label">Name:</span><span class="value bold-field">${escapeHtml(name)}</span></div>
            <div class="field"><span class="label">Address:</span><span class="value bold-field">${escapeHtml(address)}</span></div>
            <div class="field"><span class="label">TUPAD ID No.:</span><span class="value bold-field">${escapeHtml(tupadId)}</span></div>
            <div class="field"><span class="label">Month:</span><span class="value bold-field">${escapeHtml(period)}</span></div>
            <table class="dtr-table">
                <thead>
                    <tr>
                        <th class="date-col" rowspan="2">Date</th>
                        <th class="time-col" colspan="2">A.M.</th>
                        <th class="time-col" colspan="2">P.M.</th>
                    </tr>
                    <tr>
                        <th>Time In</th><th>Time Out</th><th>Time In</th><th>Time Out</th>
                    </tr>
                </thead>
                <tbody>${tableRows}</tbody>
            </table>
        </div>
        <div class="cert">I certify on my honor that the above is a true and correct report of the hours of work performed, record of which was made daily at the time of arrival and departure from work.</div>
        <div class="sig-block">
            <div class="sig-line"></div>
            <div class="sig-role">TUPAD Beneficiary</div>
        </div>
        <div class="verified">Verified by:</div>
        <div style="display:flex;justify-content:space-between;gap:2pt;margin-top:20pt;">
            <div class="verifier" style="flex:1;">
                <div class="verifier-name">${escapeHtml(pesoManager)}</div>
                <div class="sig-role"><u>${escapeHtml(pesoDesignation || 'PESO Manager')}</u> , LGU/Brgy Official<br>or Designated Rep.,(if Direct Admin)NGO/PO<br>Officers or Designated Rep. if thru Co-partner</div>
            </div>
            <div class="verifier" style="flex:1;">
                <div class="verifier-name">${escapeHtml(verifier)}</div>
                <div class="sig-role">${escapeHtml(verifierTitle)}<br>${escapeHtml(office)}</div>
            </div>
        </div>
    </div>`;
}

// ═══════════════════════════════════════════════════════════
//  GENERATE
// ═══════════════════════════════════════════════════════════
function generate() {
    const idPrefix      = document.getElementById('idPrefix').value.trim();
    const periodsText   = document.getElementById('periods').value;
    const benText       = document.getElementById('beneficiaries').value;
    const gPesomgr      = document.getElementById('pesoManager').value.trim();
    const gPesodesig    = document.getElementById('pesoDesignation').value.trim();
    const verifier      = document.getElementById('verifier').value.trim();
    const verifierTitle = document.getElementById('verifierTitle').value.trim();
    const office        = document.getElementById('office').value.trim();

    let periods = parsePeriods(periodsText);
    if (!periods.length) periods = [{ period: '', workDays: new Set() }];
    const beneficiaries = parseBeneficiaries(benText);
    const out = document.getElementById('output');

    if (!beneficiaries.length) {
        out.innerHTML = '<div class="empty-state"><h2>Please upload beneficiary data to generate DTRs.</h2></div>';
        document.getElementById('pageCount').textContent = '';
        return;
    }

    let html = '';
    for (const b of beneficiaries) {
        for (const p of periods) {
            const tupadId = idPrefix ? (idPrefix + b.idSuffix) : b.idSuffix;
            const common  = {
                name:            b.name,
                address:         b.address,
                tupadId,
                period:          p.period,
                pesoManager:     b.pesoManager     || gPesomgr,
                pesoDesignation: b.pesoDesignation || gPesodesig,
                verifier, verifierTitle, office,
                workDays: p.workDays
            };

            // Weekend info for this period
            const detected = detectWeekendDays(p.period);
            const wkSetting = getWeekendSetting(p.period);
            const weekendInfo = {
                saturdays: detected.saturdays,
                sundays:   detected.sundays,
                showSat:   wkSetting.showSat,
                showSun:   wkSetting.showSun
            };

            let pageHtml = '<div class="page">';
            pageHtml += buildDTR(common, false, weekendInfo);
            pageHtml += buildDTR(common, false, weekendInfo);
            pageHtml += buildDTR(common, false, weekendInfo);
            pageHtml += buildDTR(common, true,  weekendInfo);
            pageHtml += '</div>';
            html += pageHtml;
        }
    }

    out.innerHTML = html;

    // Update weekend info label
    const detectedCount = periods.reduce((acc, p) => {
        const d = detectWeekendDays(p.period);
        return acc + d.saturdays.size + d.sundays.size;
    }, 0);
    document.getElementById('wbInfo').textContent =
        detectedCount > 0
            ? `Auto-detected ${detectedCount} weekend day${detectedCount > 1 ? 's' : ''} across ${periods.length} period${periods.length > 1 ? 's' : ''}`
            : 'No date range detected — toggle manually';

    const totalPages = beneficiaries.length * periods.length;
    document.getElementById('pageCount').textContent =
        `${beneficiaries.length} beneficiar${beneficiaries.length === 1 ? 'y' : 'ies'} × ${periods.length} period${periods.length === 1 ? '' : 's'} — ${totalPages} page(s) ready`;
}

// ═══════════════════════════════════════════════════════════
//  PDF EXPORT
// ═══════════════════════════════════════════════════════════
async function savePDF() {
    const pages = document.querySelectorAll('#output .page');
    if (!pages.length) { alert('No DTR pages to export.'); return; }

    const btn = document.querySelector('.btn-pdf');
    btn.textContent = '⏳ Generating...';
    btn.disabled = true;

    const PDF_W = 13, PDF_H = 8.5, PX_PER_IN = 96;
    const hiddenRoot = document.createElement('div');
    Object.assign(hiddenRoot.style, {
        position:'fixed', top:'0', left:'-15000px',
        width:'0', height:'0', overflow:'visible', zIndex:'0'
    });
    document.body.appendChild(hiddenRoot);

    const raf2 = () => new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r)));

    try {
        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF({ orientation: 'landscape', unit: 'in', format: [PDF_W, PDF_H] });

        for (let i = 0; i < pages.length; i++) {
            const clone = pages[i].cloneNode(true);
            clone.classList.add('pdf-export');
            Object.assign(clone.style, {
                margin:'0', boxShadow:'none',
                width: PDF_W+'in', height:'auto',
                overflow:'visible', transformOrigin:'top left', transform:'none'
            });

            const wrapper = document.createElement('div');
            Object.assign(wrapper.style, {
                position:'absolute', top:'0', left:'0',
                width: PDF_W+'in', height: PDF_H+'in',
                overflow:'hidden', background:'#fff'
            });
            wrapper.appendChild(clone);
            hiddenRoot.appendChild(wrapper);
            await raf2();

            const naturalH = clone.scrollHeight;
            const targetH  = PDF_H * PX_PER_IN;
            if (naturalH > targetH) clone.style.transform = `scale(${targetH / naturalH})`;
            await raf2();

            const canvas = await html2canvas(wrapper, {
                scale: 1.5, allowTaint: true, useCORS: false,
                logging: false, backgroundColor: '#ffffff',
                width: wrapper.offsetWidth, height: wrapper.offsetHeight,
                scrollX: 0, scrollY: 0
            });

            if (i > 0) pdf.addPage([PDF_W, PDF_H], 'landscape');
            pdf.addImage(canvas.toDataURL('image/jpeg', 0.98), 'JPEG', 0, 0, PDF_W, PDF_H);
            hiddenRoot.removeChild(wrapper);
        }
        pdf.save('TUPAD_DTR.pdf');
    } catch (err) {
        alert('PDF export failed: ' + err.message);
    } finally {
        document.body.removeChild(hiddenRoot);
        btn.textContent = '📄 Save PDF';
        btn.disabled = false;
    }
}
